name: CI/CD — tasks-api

on:
  push:
    branches: [main, demo]
  pull_request:
    branches: [main, demo]

env:
  AWS_REGION: us-east-2
  ECR_REPO_API:      task-api
  ECR_REPO_FRONTEND: task-front

# ════════════════════════════════════════════════════════
# TIER 1 — Testes e Segurança (paralelos)
# ════════════════════════════════════════════════════════

jobs:
  test:
    name: 🧪 Testes
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tasksdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Criar banco de testes
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -c "CREATE DATABASE tasksdb_test;"

      - name: Instalar dependências
        working-directory: backend
        run: npm ci

      - name: Rodar testes
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: npm test

  security:
    name: 🔒 Segurança
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — verificar secrets expostos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

# ════════════════════════════════════════════════════════
# TIER 2 — Build (só depois de test + security passarem)
# ════════════════════════════════════════════════════════

  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - uses: actions/checkout@v4

      - name: Build imagem da API
        run: docker build -t ${{ env.ECR_REPO_API }}:${{ github.sha }} ./backend

      - name: Build imagem do Frontend
        run: docker build -t ${{ env.ECR_REPO_FRONTEND }}:${{ github.sha }} ./frontend

      - name: Exportar imagens como artefato
        run: |
          docker save ${{ env.ECR_REPO_API }}:${{ github.sha }}      | gzip > api.tar.gz
          docker save ${{ env.ECR_REPO_FRONTEND }}:${{ github.sha }} | gzip > frontend.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            api.tar.gz
            frontend.tar.gz
          retention-days: 1

# ════════════════════════════════════════════════════════
# TIER 3 — Push para o ECR  (apenas em push para branch)
# ════════════════════════════════════════════════════════

  push:
    name: 📦 Push → ECR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Baixar imagens do artefato
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Publicar imagens no ECR
        env:
          ECR: ${{ steps.login-ecr.outputs.registry }}
          SHA: ${{ github.sha }}
          API:      ${{ env.ECR_REPO_API }}
          FRONTEND: ${{ env.ECR_REPO_FRONTEND }}
        run: |
          docker load < api.tar.gz
          docker tag $API:$SHA $ECR/$API:$SHA
          docker tag $API:$SHA $ECR/$API:latest
          docker push $ECR/$API:$SHA
          docker push $ECR/$API:latest

          docker load < frontend.tar.gz
          docker tag $FRONTEND:$SHA $ECR/$FRONTEND:$SHA
          docker tag $FRONTEND:$SHA $ECR/$FRONTEND:latest
          docker push $ECR/$FRONTEND:$SHA
          docker push $ECR/$FRONTEND:latest

